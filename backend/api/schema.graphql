

type Surname {
  id: ID!
  value: String!

  createdAt: String!
  updatedAt: String!
}

input SurnameInput {
  value: String!
}

type MaidenSurname {
  id: ID!
  value: String!

  createdAt: String!
  updatedAt: String!
}

input MaidenSurnameInput {
  value: String!

}

type Country {
  id: ID!
  name: String!

  createdAt: String!
  updatedAt: String!
}

input CountryInput {
  name: String!
}

type Region {
  id: ID!
  name: String!
  country: Country!

  createdAt: String!
  updatedAt: String!
}

input RegionInput {
  name: String!
  country: CountryInput!
}

type City {
  id: ID!
  name: String!
  region: Region!

  createdAt: String!
  updatedAt: String!
}

input CityInput {
  name: String!
  region: RegionInput!
}

type Street {
  id: ID!
  name: String!
  city: City!

  createdAt: String!
  updatedAt: String!
}

input StreetInput {
  name: String!
  city: CityInput!
}

type House {
  id: ID!
  street: Street!
  name: String!

  createdAt: String!
  updatedAt: String!
}

input HouseInput {
  street: StreetInput!
  name: String!
}

type Apartment {
  id: ID!
  house: House!
  name: String!

  createdAt: String!
  updatedAt: String!
}

input ApartmentInput {
  house: HouseInput!
  name: String!
}

type Nationality {
  id: ID!
  name: String!

  createdAt: String!
  updatedAt: String!
}

input NationalityInput {

  name: String!

}

type SocialStatus {
  id: ID!
  name: String!
  description: String

  createdAt: String!
  updatedAt: String!
}

input SocialStatusInput {

  name: String!
  description: String

}

type Occupation {
  id: ID!
  title: String!
  organization: String
  startYear: String
  endYear: String

  createdAt: String!
  updatedAt: String!
}

input OccupationInput {

  title: String!
  organization: String
  startYear: String
  endYear: String

}

type Education {
  id: ID!
  institution: String
  specialty: String
  yearStart: String
  yearEnd: String

  created_at: String
  updated_at: STring
}

input EducationInput {
  institution: String
  specialty: String
  yearStart: String
  yearEnd: String
}

# ========== АДРЕСНЫЕ ТИПЫ (ДЛЯ УДОБСТВА КЛИЕНТА) ==========

type BirthPlace {
  country: Country
  region: Region
  city: City
  street: Street
  house: House
  apartment: Apartment
  fullAddress: String
  
  birthDate: String
  birthDateApprox: Boolean!
}

input BirthPlaceInput {
  country: CountryInput
  region: RegionInput
  city: CityInput
  street: StreetInput
  house: HouseInput
  apartment: ApartmentInput

  birthDate: String
  birthDateApprox: Boolean!
}

type DeathPlace {
  country: Country
  region: Region
  city: City
  fullAddress: String

  deathDate: String
  deathDateApprox: Boolean!
}

input DeathPlaceInput {
  country: CountryInput
  region: RegionInput
  city: CityInput
  
  deathDate: String
  deathDateApprox: Boolean!
}

enum Gender {
  male
  female
}

type Person {
  id: ID!
  genealogyTreeId: ID!

  # Основные данные
  surname: Surname!
  maidenSurname: MaidenSurname
  firstName: String!
  patronymic: String
  gender: Gender
  age: Number!,

  birthPlace: BirthPlace!

  deathPlace: DeathPlace

  # Характеристики
  nationality: Nationality
  socialStatus: SocialStatus

  # Био и источники
  bio: String
  sourceInfo: String
  isPersonContacted: Boolean!

  # Метаданные
  createdAt: String!
  updatedAt: String!
}

type Relation {
  fatherId: ID!
  motherId: ID!
  childId: ID!
  createdAt: String!
  updatedAt: String!
}

type Geneology_tree {
  id: ID!
  name: String!
  count_all_characters: Int
  count_all_characters_alive: Int
  count_all_characters_dead: Int
  count_all_characters_kids: Int
  count_all_characters_parents: Int
  count_all_characters_male: Int
  count_all_characters_female: Int
  created_at: String!
  updated_at: String!
}

input GeneologyTreeInput {
  name: String!
}

# поменять схему инпута, нужно связать с остальными типами
input CreatePersonInput {
  id: ID!
  surname: SurnameInput!
  maidenSurname: MaidenSurnameInput
  firstName: String!
  patronymic: String
  gender: Gender
  age: Number!
  
  birthPlace: BirthPlaceInput!
  
  deathPlace: DeathPlaceInput

  # Характеристики
  nationality: NationalityInput
  socialStatus: SocialStatusInput
  occupation: OccupationInput
  education: EducationInput

  # Био и источники
  bio: String
  sourceInfo: String
  isPersonContacted: Boolean!
}

input UpdatePersonInput {
  surname: SurnameInput
  maidenSurname: MaidenSurnameInput
  firstName: String
  patronymic: String
  gender: Gender

  birthPlace: BirthPlaceInput

  deathPlace: DeathPlaceInput

  nationality: NationalityInput
  socialStatus: SocialStatusInput
  occupation: OccupationInput
  education: EducationInput

  bio: String
  sourceInfo: String
  isPersonContacted: Boolean
}

# query и mutations
type Query {

  trees: [GenealogyTree!]
  tree(id: ID!): GenealogyTree
  persons: [Person!]
  person(id: ID!): Person
  relations: [Relation!]
}
type Mutation {
  createPerson(input: CreatePersonInput!): Person!
  updatePerson(id: ID!, input: UpdatePersonInput!): Person!
  deletePerson(id: ID!): Boolean!

  createTree(input: GenealogyTreeInput!): GenealogyTree!
  updateTree(id: ID!, input: GenealogyTreeInput!): GenealogyTree!
  deleteTree(id: ID!): Boolean!
}
