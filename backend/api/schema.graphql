  created_at: String!
  updated_at: String!
}

input CountryInput {
  name: String!
}

type Region {
  id: ID!
  name: String!
  country: Country!
  created_at: String!
  updated_at: String!
}

input RegionInput {
  name: String!
  country: CountryInput!
}

type City {
  id: ID!
  name: String!
