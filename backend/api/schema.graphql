

type Surname {
  id: ID!
  value: String!
}

type MaidenSurname {
  id: ID!
  value: String!
}

type Country {
  id: ID!
  name: String!
}

type Region {
  id: ID!
  name: String!
  country: Country!
}

type City {
  id: ID!
  name: String!
  region: Region!
}

type Street {
  id: ID!
  name: String!
  city: City!
}

type House {
  id: ID!
  street: Street!
  name: String!
}

type Apartment {
  id: ID!
  house: House!
  name: String!
}

type Nationality {
  id: ID!
  name: String!
}

type SocialStatus {
  id: ID!
  name: String!
  description: String
}

# ========== АДРЕСНЫЕ ТИПЫ (ДЛЯ УДОБСТВА КЛИЕНТА) ==========

type BirthPlace {
  country: Country
  region: Region
  city: City
  street: Street
  house: House
  apartment: Apartment
  fullAddress: String
}

type DeathPlace {
  country: Country
  region: Region
  city: City
  fullAddress: String
}

enum Gender {
  male
  female
}

type Person {
  id: ID!

  # Основные данные
  surname: Surname!
  maidenSurname: MaidenSurname
  firstName: String!
  patronymic: String
  gender: Gender

  # Дата рождения
  birthDate: String
  birthDateApprox: Boolean!
  birthPlace: BirthPlace!

  # Дата смерти
  deathDate: String
  deathDateApprox: Boolean!
  deathPlace: DeathPlace

  # Характеристики
  nationality: Nationality
  socialStatus: SocialStatus

  # Био и источники
  bio: String
  sourceInfo: String
  isPersonContacted: Boolean!

  # Метаданные
  createdAt: String!
  updatedAt: String!

  # Вычисляемые поля
  fullName: String!
  age: Int
  isAlive: Boolean!
  lifeSpan: String
}

type Relation {
  father_id: ID!
  mother_id: ID!
  child_id: ID!
  marrige_status: String!
}

type Geneology_tree_counts {
  count_all_characters: Int
  count_all_characters_alive: Int
  count_all_characters_dead: Int
  count_all_characters_kids: Int
  count_all_characters_parents: Int
  count_all_characters_male: Int
  count_all_characters_female: Int
}

type Geneology_tree {
  id: ID!
  name: String!
  count_characters: Geneology_tree_counts!
  updated_at: String!
}


# inputs

input GeneologyTreeInput {
  id: ID!
  name: String!
}

input createPersonInput {
  surname: ID!
  maiden_surname: ID
  name: String!
  patronymic: String
  gender: String!

  birthDate: String
  birthDateApprox: Boolean!
  birthPlace: String!

  deathDate: String
  deathDateApprox: Boolean!
  deathPlace: String

  nationality: String
  socialStatus: String

  bio: String
  sourceInfo: String
  isPersonContacted: Boolean!
}

# query и mutations
type Query {

  trees: [Geneology_tree!]
  tree(id: ID!): Geneology_tree
  persons: [Person!]
  person(id: ID!): Person
}
type Mutation {
  createPerson(input: createPersonInput!): Person!
  updatePerson(input: createPersonInput!, id: String!): Person!
  deletePerson(id: ID!): Boolean!
  createTree(input: GeneologyTreeInput!): Geneology_tree
  updateTree(input: GeneologyTreeInput!, id: String!): Geneology_tree!
  deleteTree(id: ID!): Boolean!
}
