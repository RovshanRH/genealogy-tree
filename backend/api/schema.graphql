type Surname {
  id: ID!
  name: String!
  value: String!

  createdAt: String!
  updatedAt: String!
}

input SurnameInput {
  name: String
  value: String
}

input MaidenSurnameInput {
  name: String
  value: String
}

type Country {
  id: ID!
  name: String!

  createdAt: String!
  updatedAt: String!
}

input CountryInput {
  name: String!
}

type Region {
  id: ID!
  name: String!
  country: Country!

  createdAt: String!
  updatedAt: String!
}

input RegionInput {
  name: String!
  country: CountryInput!
}

type City {
  id: ID!
  name: String!
  region: Region!

  createdAt: String!
  updatedAt: String!
}

input CityInput {
  name: String!
  region: RegionInput!
}

type Street {
  id: ID!
  name: String!
  city: City!

  createdAt: String!
  updatedAt: String!
}

input StreetInput {
  name: String!
  city: CityInput!
}

type House {
  id: ID!
  street: Street!
  name: String!

  createdAt: String!
  updatedAt: String!
}

input HouseInput {
  street: StreetInput!
  name: String!
}

type Apartment {
  id: ID!
  house: House!
  name: String!

  createdAt: String!
  updatedAt: String!
}

input ApartmentInput {
  house: HouseInput!
  name: String!
}

type Residence {
  id: ID!
  personId: ID!

  country: Country!
  city: City!
  street: Street!
  house: House!
  apartment: Apartment!

  start_date: String!
  end_date: String!
  start_date_approx: Boolean
  end_date_approx: Boolean

  createdAt: String!
  updatedAt: String!
}

input ResidenceInput {
  personId: ID!

  country: CountryInput
  city: CityInput
  street: StreetInput
  house: HouseInput
  apartment: ApartmentInput

  start_date: String
  end_date: String
  start_date_approx: Boolean
  end_date_approx: Boolean
}

type Nationality {
  id: ID!
  name: String!

  createdAt: String!
  updatedAt: String!
}

input NationalityInput {
  name: String!
}

type SocialStatus {
  id: ID!
  name: String!
  description: String

  createdAt: String!
  updatedAt: String!
}

input SocialStatusInput {
  name: String!
  description: String
}

type Occupation {
  id: ID!
  personId: ID!

  title: String!
  organization: String
  startYear: String
  endYear: String

  createdAt: String!
  updatedAt: String!
}

input OccupationInput {
  personId: ID!
  title: String!
  organization: String
  startYear: String
  endYear: String
}

type Education {
  id: ID!
  personId: ID!
  institution: String
  specialty: String
  yearStart: String
  yearEnd: String

  created_at: String
  updated_at: String
}

input EducationInput {
  personId: ID!
  institution: String
  degree: String
  specialty: String
  yearStart: String
  yearEnd: String
}

# ========== АДРЕСНЫЕ ТИПЫ (ДЛЯ УДОБСТВА КЛИЕНТА) ==========

type BirthPlace {
  country: Country
  region: Region
  city: City
  street: Street
  house: House
  apartment: Apartment
  fullAddress: String

  birthDate: String
  birthDateApprox: Boolean!
}

input BirthPlaceInput {
  country: CountryInput
  region: RegionInput
  city: CityInput
  street: StreetInput
  house: HouseInput
  apartment: ApartmentInput

  birthDate: String
  birthDateApprox: Boolean!
}

type DeathPlace {
  country: Country
  region: Region
  city: City
  fullAddress: String

  deathDate: String
  deathDateApprox: Boolean!
}

input DeathPlaceInput {
  country: CountryInput
  region: RegionInput
  city: CityInput

  deathDate: String
  deathDateApprox: Boolean!
}

enum Gender {
  male
  female
}

type Person {
  id: ID!
  genealogyTreeId: ID!

  mother: Person
  father: Person
  spouse: Person

  marital_status: String

  # Основные данные
  surname: Surname!
  maidenSurname: Surname
  firstname: String!
  patronymic: String!
  gender: Gender
  age: Int

  fullName: String
  residence: [Residence]

  fullAddress: [String]
  cityAddress: [String]

  birthPlace: BirthPlace!
  deathPlace: DeathPlace

  # Характеристики
  nationality: Nationality
  socialStatus: SocialStatus
  occupation: [Occupation]
  education: [Education]

  # Био и источники
  bio: String
  sourceInfo: String
  isPersonContacted: Boolean
  isAlive: Boolean

  # Метаданные
  createdAt: String!
  updatedAt: String!
}

# поменять схему инпута, нужно связать с остальными типами
input CreatePersonInput {
  mother: CreatePersonInput
  father: CreatePersonInput
  spouse: CreatePersonInput

  marital_status: String

  # Основные данные
  surname: SurnameInput!
  maidenSurname: SurnameInput
  firstname: String!
  patronymic: String!
  gender: Gender
  age: Int

  # residence: [ResidenceInput]

  birthPlace: BirthPlaceInput!
  deathPlace: DeathPlaceInput

  # Характеристики
  nationality: NationalityInput
  socialStatus: SocialStatusInput
  # occupation: [OccupationInput]
  # education: [EducationInput]

  # Био и источники
  bio: String
  sourceInfo: String
  isPersonContacted: Boolean
  isAlive: Boolean
}

input UpdatePersonInput {
  mother: CreatePersonInput
  father: CreatePersonInput
  spouse: CreatePersonInput

  marital_status: String

  # Основные данные
  surname: SurnameInput!
  maidenSurname: SurnameInput
  firstname: String!
  patronymic: String!
  gender: Gender
  age: Int

  # residence: [ResidenceInput]

  birthPlace: BirthPlaceInput!
  deathPlace: DeathPlaceInput

  # Характеристики
  nationality: NationalityInput
  socialStatus: SocialStatusInput
  # occupation: [OccupationInput]
  # education: [EducationInput]

  # Био и источники
  bio: String
  sourceInfo: String
  isPersonContacted: Boolean
  isAlive: Boolean
}

type Relation {
  fatherId: ID
  motherId: ID
  childId: ID!
  spouseID: ID
  createdAt: String!
  updatedAt: String!
}

type GenealogyTree {
  id: ID!
  name: String!
  count_all_characters: Int
  count_all_characters_alive: Int
  count_all_characters_dead: Int
  count_all_characters_kids: Int
  count_all_characters_parents: Int
  count_all_characters_male: Int
  count_all_characters_female: Int
  created_at: String!
  updated_at: String!
}

input GenealogyTreeInput {
  name: String!
}

# query и mutations
type Query {
  # Tree
  trees: [GenealogyTree]!
  tree(id: ID!): GenealogyTree
  # Person
  persons: [Person]!
  person(id: ID!): Person
  # Characteristics
  occupation(id: String!): Occupation
  person_occupations(personId: ID!): [Occupation]
  occupations: [Occupation]

  education(id: String!): Education
  person_educations(personId: ID!): [Education]
  educations: [Education]

  residence(id: String!): Residence
  person_residentials(personId: ID!): [Residence]
  residentials: [Residence]
  # Relationships
  relations: [Relation]!
}
type Mutation {
  # Person
  createPerson(input: CreatePersonInput!): Person!
  updatePerson(id: ID!, input: UpdatePersonInput!): Person!
  deletePerson(id: ID!): Person!

  # Occupation
  createOccupation(input: OccupationInput!): Occupation!
  updateOccupation(input: OccupationInput!): Occupation!
  deleteOccupation(id: ID!): Occupation!

  # Education
  createEducation(input: EducationInput!): Education!
  updateEducation(input: EducationInput!): Education!
  deleteEducation(id: ID!): Education!

  # Residence
  createResidence(input: ResidenceInput!): Residence!
  updateResidence(input: ResidenceInput!): Residence!
  deleteResidence(id: ID!): Residence!

  # Tree
  createTree(input: GenealogyTreeInput!): GenealogyTree!
  updateTree(id: ID!, input: GenealogyTreeInput!): GenealogyTree!
  deleteTree(id: ID!): GenealogyTree!
}
