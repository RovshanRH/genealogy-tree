type BirthPlace {
  country: Country
  region: Region
  city: City
  street: Street
  house: House
  apartment: Apartment
  full_address: String

  birth_date: String
  birth_date_approx: Boolean
}

input BirthPlaceInput {
  country: CountryInput
  region: RegionInput
  city: CityInput
  street: StreetInput
  house: HouseInput
  apartment: ApartmentInput

  birth_date: String
  birth_date_approx: Boolean
}

type DeathPlace {
  country: Country
  region: Region
  city: City
  full_address: String

  death_date: String
  death_date_approx: Boolean
}

input DeathPlaceInput {
  country: CountryInput
  region: RegionInput
  city: CityInput

  death_date: String
  death_date_approx: Boolean
}

enum Gender {
  male
  female
}

type Person {
  id: ID!
  genealogy_tree_id: ID!

  mother: Person
  father: Person
  spouse: Person

  marital_status: String

  # Основные данные
  surname: Surname!
  maidensurname: Surname
  firstname: String!
  patronymic: String!
  gender: Gender
  age: Int

  fullname: String
  residence: [Residence]!

  fulladdress: [String]
  cityaddress: [String]

  birth_place: BirthPlace!
  death_place: DeathPlace

  # Характеристики
  nationality: Nationality
  social_status: SocialStatus
  occupation: [Occupation]
  education: [Education]

  # Био и источники
  bio: String
  source_info: String
  ispersoncontacted: Boolean
  isalive: Boolean

  # Метаданные
  created_at: String!
  updated_at: String!
}

# поменять схему инпута, нужно связать с остальными типами
input CreatePersonInput {
  genealogy_tree_id: ID!

  mother: CreatePersonInput
  father: CreatePersonInput
  spouse: CreatePersonInput

  marital_status: String

  # Основные данные
  surname: SurnameInput!
  maidensurname: SurnameInput
  firstname: String!
  patronymic: String!
  gender: Gender
  age: Int

  # residence: [ResidenceInput]

  birth_place: BirthPlaceInput!
  death_place: DeathPlaceInput

  # Характеристики
  nationality: NationalityInput
  social_status: SocialStatusInput
  # occupation: [OccupationInput]
  # education: [EducationInput]

  # Био и источники
  bio: String
  source_info: String
  ispersoncontacted: Boolean
  isalive: Boolean
}

input UpdatePersonInput {
  mother: CreatePersonInput
  father: CreatePersonInput
  spouse: CreatePersonInput

  marital_status: String

  # Основные данные
  surname: SurnameInput!
  maidensurname: SurnameInput
  firstname: String!
  patronymic: String!
  gender: Gender
  age: Int

  # residence: [ResidenceInput]

  birth_place: BirthPlaceInput!
  death_place: DeathPlaceInput

  # Характеристики
  nationality: NationalityInput
  social_status: SocialStatusInput
  # occupation: [OccupationInput]
  # education: [EducationInput]

  # Био и источники
  bio: String
  source_info: String
  ispersoncontacted: Boolean
  isalive: Boolean
}

type Relation {
  fatherId: ID
  motherId: ID
  childId: ID!
  spouseID: ID
  created_at: String!
  updated_at: String!
}

type GenealogyTree {
  id: ID!
  name: String!
  count_all_characters: Int
  count_all_characters_alive: Int
  count_all_characters_dead: Int
  count_all_characters_kids: Int
  count_all_characters_parents: Int
  count_all_characters_male: Int
  count_all_characters_female: Int
  created_at: String!
  updated_at: String!
}

input GenealogyTreeInput {
  name: String!
}

# query и mutations
type Query {
  # Tree
  trees: [GenealogyTree]!
  tree(id: ID!): GenealogyTree
  # Person
  persons: [Person]!
  person(id: ID!): Person
  # Characteristics
  occupation(id: String!): Occupation
  person_occupations(personId: ID!): [Occupation]
  occupations: [Occupation]

  education(id: String!): Education
  person_educations(personId: ID!): [Education]
  educations: [Education]

  residence(id: String!): Residence
  person_residentials(personId: ID!): [Residence]
  residentials: [Residence]
  # Relationships
  relations: [Relation]!
}
type Mutation {
  # Person
  createPerson(input: CreatePersonInput!): Person!
  updatePerson(id: ID!, input: CreatePersonInput!): Person!
  deletePerson(id: ID!): Person!

  # Occupation
  createOccupation(input: OccupationInput!): Occupation!
  updateOccupation(input: OccupationInput!): Occupation!
  deleteOccupation(id: ID!): Occupation!

  # Education
  createEducation(input: EducationInput!): Education!
  updateEducation(input: EducationInput!): Education!
  deleteEducation(id: ID!): Education!

  # Residence
  createResidence(input: ResidenceInput!): Residence!
  updateResidence(input: ResidenceInput!): Residence!
  deleteResidence(id: ID!): Residence!

  # Tree
  createTree(input: GenealogyTreeInput!): GenealogyTree!
  updateTree(id: ID!, input: GenealogyTreeInput!): GenealogyTree!
  deleteTree(id: ID!): GenealogyTree!
}
